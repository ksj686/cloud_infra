# .pre-commit-config.yaml
# 프로젝트 품질 및 보안 통합 관리 설정 (v2.0)

repos:
  # 1. 시크릿 유출 차단 및 보안 강화
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: "Gitleaks (Secret Scanning)"
        description: "소스 코드 내 민감 정보 유출 사전 탐지"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key # SSH/TLS 개인키 파일 탐지
      - id: check-added-large-files # 대용량 파일(로그, 바이너리) 커밋 방지 (500KB)
        args: ["--maxkb=500"]
      - id: check-symlinks # 깨진 심볼릭 링크 확인
      - id: check-yaml
        exclude: ^mkdocs\.yml$ # 커스텀 태그가 포함된 파일은 검사 제외
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # 2. 쉘 스크립트 품질 진단 (ShellCheck)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: "ShellCheck (Bash Linting)"
        description: "쉘 스크립트 문법 오류 및 잠재적 버그 진단"

  # 3. 문서 스타일 자동 포맷팅 (Prettier)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: "Prettier (Auto Formatting)"
        types_or: [markdown, yaml, json]
        additional_dependencies:
          - prettier@3.1.0
